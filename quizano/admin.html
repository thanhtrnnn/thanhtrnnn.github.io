<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng nhập Quản trị viên - Quizano</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container text-center" style="max-width: 500px; margin-top: 100px;">
        <h2>Đăng nhập Quản trị viên</h2>
        <hr>
        <fieldset>
            <legend>Thông tin đăng nhập</legend>
            <form id="adminLoginForm" onsubmit="event.preventDefault(); handleAdminLogin();">
                <div class="form-group">
                    <label>Tên đăng nhập:</label>
                    <input type="text" id="aUsername" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu:</label>
                    <input type="password" id="aPassword" required>
                </div>
                <p class="text-danger" id="aErrorMsg"></p>
                <button type="submit" class="btn btn-primary">Đăng nhập</button>
            </form>
        </fieldset>
        <p class="mt-3"><a href="index.html">Quay lại trang Sinh viên</a></p>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
