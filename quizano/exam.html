<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Làm bài thi - Quizano</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="header header-student">
        <h3>Quizano</h3>
        <h3 id="examTitleDisplay">Đang tải dữ liệu...</h3>
        <div class="text-danger font-weight-bold" style="font-size: 1.2em;">
            Thời gian còn lại: <span id="timeRemainingDisplay">--:--</span>
        </div>
    </div>

    <div class="container">
        <p id="examDescriptionDisplay"></p>
        <hr>

        <form id="examForm" onsubmit="event.preventDefault(); submitExam(false);">
            <div id="questionsWrapper">
                <!-- Javascript rendering -->
            </div>

            <hr>
            <div class="text-center">
                <button type="submit" class="btn btn-primary" style="font-size: 1.1em; padding: 10px 30px;">Hoàn thành &
                    Nộp bài</button>
            </div>
        </form>
    </div>

    <script src="js/data.js"></script>
    <script src="js/exam.js"></script>
</body>

</html>
