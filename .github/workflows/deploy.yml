# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build and deploy job
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: exam-diary/package-lock.json
          
      - name: Install dependencies
        run: |
          cd exam-diary
          npm install
        
      - name: Build exam-diary
        run: |
          cd exam-diary
          npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Prepare staging directory
        run: |
          mkdir staging
          # Copy root static files (index, styling, CV, etc.)
          cp index.html staging/
          cp style.css staging/
          cp script.js staging/ 2>/dev/null || true
          cp -r assets staging/ 2>/dev/null || true
          cp -r QLSV staging/ 2>/dev/null || true
          cp -r quizano staging/ 2>/dev/null || true
          cp contact.html staging/ 2>/dev/null || true
          cp initial.png staging/ 2>/dev/null || true
          
          # Copy built exam-diary to sub-path
          mkdir -p staging/exam-diary
          cp -r exam-diary/dist/* staging/exam-diary/

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the prepared staging directory
          path: './staging'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
